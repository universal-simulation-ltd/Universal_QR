name: Build Windows installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win
        env:
          # Universal QR never talks to Supabase — main.tsx falls back to
          # harmless placeholders when these are unset — so unlike Universal
          # PDF no Supabase secrets are needed here.
          # No code-signing cert configured. CSC_IDENTITY_AUTO_DISCOVERY=false
          # stops electron-builder from probing the keychain on hosted runners.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-qr-windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          generate_release_notes: true
